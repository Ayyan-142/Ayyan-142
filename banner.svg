<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="45%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="55%" style="stop-color:#c9b8ff"/>
      <stop offset="100%" style="stop-color:#38bdae"/>
    </linearGradient>
    <linearGradient id="tagline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf91f3"/>
      <stop offset="100%" style="stop-color:#38bdae"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bf91f3"/>
      <stop offset="100%" style="stop-color:#38bdae"/>
    </linearGradient>
    <linearGradient id="underline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf91f3"/>
      <stop offset="60%" style="stop-color:#38bdae"/>
      <stop offset="100%" style="stop-color:#38bdae;stop-opacity:0"/>
    </linearGradient>
    <filter id="name-glow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="blob" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rich deep background -->
  <rect width="1280" height="320" fill="url(#bg-grad)"/>

  <!-- Color blobs — VIVID this time -->
  <ellipse cx="100" cy="160" rx="350" ry="220" fill="#6c3fc5" opacity="0.22" filter="url(#blob)"/>
  <ellipse cx="1180" cy="160" rx="300" ry="200" fill="#1a7a6e" opacity="0.28" filter="url(#blob)"/>
  <ellipse cx="580" cy="320" rx="450" ry="140" fill="#2d1b69" opacity="0.35" filter="url(#blob)"/>
  <ellipse cx="900" cy="60" rx="250" ry="100" fill="#0e4a5c" opacity="0.3" filter="url(#blob)"/>

  <!-- Subtle noise lines — gives texture -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.03">
    <line x1="0" y1="53" x2="1280" y2="53"/>
    <line x1="0" y1="106" x2="1280" y2="106"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="213" x2="1280" y2="213"/>
    <line x1="0" y1="266" x2="1280" y2="266"/>
  </g>

  <!-- LEFT ACCENT BAR — gradient, thick, glowing -->
  <rect x="52" y="62" width="6" height="196" rx="3" fill="url(#bar-grad)" filter="url(#dot-glow)"/>

  <!-- github comment -->
  <text x="76" y="44" font-family="'Courier New', monospace" font-size="11.5" fill="#4a5568" letter-spacing="2.5" opacity="0.8">// github.com/Ayyan-142</text>

  <!-- Hey there greeting -->
  <text x="76" y="104" font-family="Georgia, serif" font-size="19" fill="#94a3b8" font-style="italic" letter-spacing="3.5">Hey there, I&apos;m 👋</text>

  <!-- AYYAN — huge, gradient, glowing -->
  <text
    x="70"
    y="215"
    font-family="Georgia, serif"
    font-size="118"
    font-weight="900"
    fill="url(#name-grad)"
    letter-spacing="-4"
    filter="url(#name-glow)"
  >Ayyan.</text>

  <!-- Underline — gradient, thick -->
  <rect x="72" y="227" width="510" height="4" rx="2" fill="url(#underline-grad)"/>

  <!-- Tagline — gradient colored -->
  <text
    x="76"
    y="276"
    font-family="Georgia, serif"
    font-size="20"
    font-style="italic"
    fill="url(#tagline-grad)"
    letter-spacing="0.8"
  >The builder who turns ideas into products that matter.</text>

  <!-- RIGHT SIDE — 3 stacked achievement cards -->
  <!-- Card 1: Hackathon Winner -->
  <g transform="translate(980, 62)">
    <rect width="246" height="52" rx="10" fill="#0a1628" stroke="#38bdae" stroke-width="1.5" opacity="0.95"/>
    <rect width="246" height="52" rx="10" fill="#38bdae" opacity="0.06"/>
    <text x="26" y="22" font-family="'Courier New', monospace" font-size="10" fill="#38bdae" letter-spacing="1.5" opacity="0.7">NATIONAL HACKATHON</text>
    <text x="26" y="41" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#38bdae">🏆 Hackathon Winner</text>
  </g>

  <!-- Card 2: Google Gemini Ambassador -->
  <g transform="translate(980, 128)">
    <rect width="246" height="52" rx="10" fill="#0a1628" stroke="#70a5fd" stroke-width="1.5" opacity="0.95"/>
    <rect width="246" height="52" rx="10" fill="#70a5fd" opacity="0.06"/>
    <text x="26" y="22" font-family="'Courier New', monospace" font-size="10" fill="#70a5fd" letter-spacing="1.5" opacity="0.7">GOOGLE · 2026</text>
    <text x="26" y="41" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#70a5fd">🌟 Gemini Ambassador</text>
  </g>

  <!-- Card 3: GSSoC -->
  <g transform="translate(980, 194)">
    <rect width="246" height="52" rx="10" fill="#0a1628" stroke="#bf91f3" stroke-width="1.5" opacity="0.95"/>
    <rect width="246" height="52" rx="10" fill="#bf91f3" opacity="0.06"/>
    <text x="26" y="22" font-family="'Courier New', monospace" font-size="10" fill="#bf91f3" letter-spacing="1.5" opacity="0.7">OPEN SOURCE · 2026</text>
    <text x="26" y="41" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#bf91f3">🔓 GSSoC Contributor</text>
  </g>

  <!-- Bottom left dots fading -->
  <g filter="url(#dot-glow)">
    <circle cx="76" cy="304" r="4" fill="#bf91f3" opacity="0.7"/>
    <circle cx="93" cy="304" r="3.5" fill="#8b6fd4" opacity="0.5"/>
    <circle cx="109" cy="304" r="3" fill="#5a4a8a" opacity="0.35"/>
    <circle cx="124" cy="304" r="2" fill="#3d3360" opacity="0.2"/>
    <circle cx="136" cy="304" r="1.5" fill="#3d3360" opacity="0.1"/>
  </g>

  <!-- Bottom right CSE tag -->
  <text x="960" y="310" font-family="'Courier New', monospace" font-size="11" fill="#3d444d" text-anchor="end" letter-spacing="2">Sathyabama · CSE · 2028</text>

</svg>
