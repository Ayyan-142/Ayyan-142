<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>

    <!-- Glow for accent elements -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Noise texture for grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Clip path for rounded corners -->
    <clipPath id="rounded">
      <rect width="1280" height="320" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#0d1117"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#70a5fd" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="160" rx="300" ry="140" fill="#bf91f3" opacity="0.06" filter="url(#softglow)"/>
  <ellipse cx="1080" cy="160" rx="280" ry="120" fill="#70a5fd" opacity="0.07" filter="url(#softglow)"/>
  <ellipse cx="640" cy="300" rx="400" ry="80" fill="#38bdae" opacity="0.05" filter="url(#softglow)"/>

  <!-- Left accent bar -->
  <rect x="64" y="80" width="4" height="160" rx="2" fill="#70a5fd" opacity="0.8" filter="url(#glow)"/>

  <!-- Trophy badge top-right -->
  <g transform="translate(1130, 48)" filter="url(#glow)">
    <rect width="118" height="34" rx="17" fill="none" stroke="#38bdae" stroke-width="1.2" opacity="0.7"/>
    <text x="59" y="22" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#38bdae" text-anchor="middle" letter-spacing="1.5">🏆 WINNER</text>
  </g>

  <!-- Greeting line -->
  <text
    x="96"
    y="118"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="18"
    fill="#8b949e"
    font-style="italic"
    letter-spacing="3"
    opacity="0.9"
  >Hey there, I&apos;m</text>

  <!-- Main name - big, bold, white -->
  <text
    x="92"
    y="200"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="88"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-2"
    filter="url(#glow)"
  >Ayyan</text>

  <!-- Subtle name underline stroke -->
  <line x1="92" y1="212" x2="460" y2="212" stroke="#70a5fd" stroke-width="2" opacity="0.4"/>

  <!-- Tagline -->
  <text
    x="96"
    y="260"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="22"
    fill="#c9d1d9"
    font-style="italic"
    letter-spacing="0.5"
    opacity="0.85"
  >The builder who turns ideas into products that matter.</text>

  <!-- Waving hand emoji area -->
  <text x="980" y="200" font-size="80" opacity="0.9">👋</text>

  <!-- Bottom right — subtle stat pills -->
  <g transform="translate(1100, 260)">
    <rect width="140" height="28" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="70" y="19" font-family="'Courier New', monospace" font-size="10" fill="#70a5fd" text-anchor="middle" letter-spacing="1">AI BUILDER · CSE &apos;26</text>
  </g>

  <!-- Decorative dots bottom left -->
  <g opacity="0.25" fill="#70a5fd">
    <circle cx="64" cy="278" r="3"/>
    <circle cx="76" cy="278" r="3"/>
    <circle cx="88" cy="278" r="3"/>
    <circle cx="100" cy="278" r="3"/>
    <circle cx="112" cy="278" r="3"/>
  </g>

  <!-- Top left subtle tag -->
  <text x="96" y="52" font-family="'Courier New', monospace" font-size="11" fill="#30363d" letter-spacing="2">// github.com/Ayyan-142</text>

</svg>
