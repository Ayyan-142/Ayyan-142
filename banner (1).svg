<svg width="1280" height="340" viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-name" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="60%" style="stop-color:#e8eaed"/>
      <stop offset="100%" style="stop-color:#70a5fd"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#70a5fd"/>
      <stop offset="100%" style="stop-color:#70a5fd;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tagline-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf91f3"/>
      <stop offset="100%" style="stop-color:#38bdae"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1280" height="340" fill="#0d1117"/>

  <!-- Large ambient color blobs -->
  <ellipse cx="120" cy="170" rx="380" ry="200" fill="#1a1f6e" opacity="0.5" filter="url(#glow-soft)"/>
  <ellipse cx="1160" cy="170" rx="320" ry="180" fill="#0e3a4a" opacity="0.6" filter="url(#glow-soft)"/>
  <ellipse cx="640" cy="340" rx="500" ry="120" fill="#1a0e3a" opacity="0.5" filter="url(#glow-soft)"/>

  <!-- Diagonal accent stripe -->
  <polygon points="0,0 180,0 0,340" fill="#70a5fd" opacity="0.025"/>

  <!-- Left vivid accent bar -->
  <rect x="56" y="70" width="5" height="200" rx="3" fill="url(#line-grad)" filter="url(#glow-blue)"/>

  <!-- Top comment line -->
  <text x="80" y="48" font-family="'Courier New', monospace" font-size="12" fill="#3d444d" letter-spacing="2">// github.com/Ayyan-142</text>

  <!-- Greeting -->
  <text x="80" y="108" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#8b949e" font-style="italic" letter-spacing="4" opacity="0.95">Hey there, I&apos;m 👋</text>

  <!-- MAIN NAME — massive, gradient -->
  <text
    x="76"
    y="222"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="112"
    font-weight="900"
    fill="url(#name-grad)"
    letter-spacing="-3"
    filter="url(#glow-name)"
  >Ayyan.</text>

  <!-- Underline -->
  <rect x="76" y="232" width="480" height="3" rx="2" fill="url(#line-grad)"/>

  <!-- Tagline with gradient -->
  <text
    x="80"
    y="284"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="21"
    font-style="italic"
    fill="url(#tagline-grad)"
    letter-spacing="0.5"
    opacity="0.9"
  >The builder who turns ideas into products that matter.</text>

  <!-- Winner pill — top right, more vivid -->
  <g transform="translate(1072, 42)">
    <rect width="162" height="38" rx="19" fill="#0e2a1a" stroke="#38bdae" stroke-width="1.5"/>
    <rect width="162" height="38" rx="19" fill="#38bdae" opacity="0.08"/>
    <text x="81" y="25" font-family="'Courier New', monospace" font-size="13" font-weight="700" fill="#38bdae" text-anchor="middle" letter-spacing="2">🏆 WINNER</text>
  </g>

  <!-- IIT badge below winner -->
  <g transform="translate(1083, 92)">
    <rect width="140" height="32" rx="16" fill="#0f1e2e" stroke="#70a5fd" stroke-width="1.2"/>
    <text x="70" y="21" font-family="'Courier New', monospace" font-size="11" fill="#70a5fd" text-anchor="middle" letter-spacing="1.5">IIT HACKATHON</text>
  </g>

  <!-- Builder pill -->
  <g transform="translate(1095, 136)">
    <rect width="116" height="30" rx="15" fill="#1a0e3a" stroke="#bf91f3" stroke-width="1.2"/>
    <text x="58" y="20" font-family="'Courier New', monospace" font-size="11" fill="#bf91f3" text-anchor="middle" letter-spacing="1.5">AI BUILDER</text>
  </g>

  <!-- Floating dots grid — right side decoration -->
  <g opacity="0.12" fill="#70a5fd">
    <circle cx="900" cy="80" r="2.5"/><circle cx="920" cy="80" r="2.5"/><circle cx="940" cy="80" r="2.5"/>
    <circle cx="900" cy="100" r="2.5"/><circle cx="920" cy="100" r="2.5"/><circle cx="940" cy="100" r="2.5"/>
    <circle cx="900" cy="120" r="2.5"/><circle cx="920" cy="120" r="2.5"/><circle cx="940" cy="120" r="2.5"/>
    <circle cx="900" cy="140" r="2.5"/><circle cx="920" cy="140" r="2.5"/><circle cx="940" cy="140" r="2.5"/>
  </g>

  <!-- CSE tag bottom right -->
  <text x="1190" y="318" font-family="'Courier New', monospace" font-size="11" fill="#3d444d" text-anchor="end" letter-spacing="1.5">CSE · Sathyabama · &apos;26</text>

  <!-- Bottom accent dots -->
  <g fill="#bf91f3" opacity="0.4">
    <circle cx="76" cy="312" r="3.5" filter="url(#glow-blue)"/>
    <circle cx="91" cy="312" r="3.5" filter="url(#glow-blue)"/>
    <circle cx="106" cy="312" r="3.5" filter="url(#glow-blue)"/>
    <circle cx="121" cy="312" r="2"/>
    <circle cx="136" cy="312" r="1.5"/>
    <circle cx="149" cy="312" r="1"/>
  </g>

</svg>
